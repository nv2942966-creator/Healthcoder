name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to manually trigger the build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-size: 16
        node-version: 18

    - name: Install System Dependencies
      run: |
        npm install
        npm install -g @capacitor/cli

    - name: Initialize Capacitor Configuration
      run: |
        npx cap init healthcoder com.healthcoder.app --web-dir=.
        npx cap add android

    - name: Copy App Assets
      run: |
        # Copies your HealthCoder.jsx file into a runnable single-page index.html asset
        mkdir -p android/app/src/main/assets/public
        cp index.html android/app/src/main/assets/public/index.html

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Compile Android Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: healthcoder-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk


